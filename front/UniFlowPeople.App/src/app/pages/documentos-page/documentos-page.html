<section class="panel fade-in">
  <div class="panel-title"><div><h2>Documentos</h2><p>Controle documentos obrigatórios e validações.</p></div><span>{{ vm.documentos().length }}</span></div>
  <form class="form-grid cols-6" (ngSubmit)="vm.salvarDocumento()">
    <select name="docColab" [(ngModel)]="vm.documentoForm.colaboradorId" required>
      <option [ngValue]="undefined">Colaborador</option>
      <option *ngFor="let colab of vm.colaboradores()" [ngValue]="colab.id">{{ colab.nome }}</option>
    </select>
    <input name="docTipo" [(ngModel)]="vm.documentoForm.tipoDocumento" placeholder="Tipo" required />
    <input name="docNome" [(ngModel)]="vm.documentoForm.nomeArquivo" placeholder="Nome do arquivo" required />
    <input name="docUrl" [(ngModel)]="vm.documentoForm.urlArquivo" placeholder="URL do arquivo" required />
    <label class="check"><input name="docObrig" [(ngModel)]="vm.documentoForm.obrigatorio" type="checkbox" /> Obrigatório</label>
    <label class="check"><input name="docVal" [(ngModel)]="vm.documentoForm.validado" type="checkbox" /> Validado</label>
    <button type="submit">Salvar documento</button>
  </form>
  <div class="cards">
    <article *ngFor="let item of vm.documentos()">
      <div class="card-head"><strong>{{ item.tipoDocumento }}</strong><span class="status">{{ item.validado ? 'Validado' : 'Pendente' }}</span></div>
      <span>{{ vm.nomeColaborador(item.colaboradorId) }}</span>
      <small>{{ item.nomeArquivo }}</small>
      <div class="row-actions"><button class="danger-soft" type="button" (click)="vm.pedirExclusao('documentosColaboradores', item.id, item.nomeArquivo)">Excluir</button></div>
    </article>
  </div>
</section>

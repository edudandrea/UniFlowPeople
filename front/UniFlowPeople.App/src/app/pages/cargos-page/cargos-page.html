<section class="panel fade-in">
  <div class="panel-title">
    <div>
      <h2>Cargos</h2>
      <p>Cadastre funções, níveis e salário base.</p>
    </div>
    <span>{{ vm.cargos().length }} cargos</span>
  </div>

  <form class="form-grid cols-5" (ngSubmit)="vm.salvarCargo()">
    <input name="cargoNome" [(ngModel)]="vm.cargoForm.nome" placeholder="Cargo" required />
    <input name="cargoNivel" [(ngModel)]="vm.cargoForm.nivel" placeholder="Nível" />
    <input name="cargoSalario" [(ngModel)]="vm.cargoForm.salarioBase" type="number" placeholder="Salário base" />
    <input name="cargoDescricao" [(ngModel)]="vm.cargoForm.descricao" placeholder="Descrição" />
    <button type="submit">{{ vm.cargoForm.id ? 'Atualizar' : 'Salvar cargo' }}</button>
  </form>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Cargo</th><th>Nível</th><th>Salário base</th><th>Descrição</th><th></th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of vm.cargos()">
          <td>{{ item.nome }}</td>
          <td>{{ item.nivel || '-' }}</td>
          <td>{{ item.salarioBase | currency: 'BRL' }}</td>
          <td>{{ item.descricao || '-' }}</td>
          <td class="actions">
            <button class="soft" type="button" (click)="vm.editarGenerico('cargoForm', item)">Editar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

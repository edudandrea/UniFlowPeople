<section class="panel fade-in">
  <div class="panel-title">
    <div><h2>Usuários e perfis</h2><p>Crie acessos com permissões adequadas para cada área.</p></div>
    <span>{{ vm.filteredUsuarios().length }} acessos</span>
  </div>
  <form class="form-grid cols-6" (ngSubmit)="vm.salvarUsuario()">
    <select *ngIf="vm.isSistemaAdmin()" name="usuarioEmpresa" [(ngModel)]="vm.usuarioForm.empresaId" required>
      <option [ngValue]="undefined">Empresa</option>
      <option *ngFor="let empresa of vm.empresas()" [ngValue]="empresa.id">{{ empresa.nomeFantasia }}</option>
    </select>
    <select *ngIf="!vm.isSistemaAdmin()" name="usuarioColaborador" [(ngModel)]="vm.usuarioForm.colaboradorId">
      <option [ngValue]="undefined">Colaborador vinculado</option>
      <option *ngFor="let colab of vm.colaboradores()" [ngValue]="colab.id">{{ colab.nome }}</option>
    </select>
    <input name="usuarioNome" [(ngModel)]="vm.usuarioForm.nome" placeholder="Nome" required />
    <input name="usuarioLogin" [(ngModel)]="vm.usuarioForm.login" placeholder="Login" required />
    <input name="usuarioEmail" [(ngModel)]="vm.usuarioForm.email" placeholder="E-mail" required />
    <input name="usuarioSenha" [(ngModel)]="vm.usuarioForm.senha" type="password" placeholder="Senha" required />
    <select name="usuarioPerfil" [(ngModel)]="vm.usuarioForm.role">
      <option>EmpresaAdmin</option>
      <option>RH</option>
      <option>Gestor</option>
      <option>Colaborador</option>
    </select>
    <button type="submit">Criar usuário</button>
  </form>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nome</th><th>Login</th><th>E-mail</th><th>Perfil</th><th>Empresa</th></tr></thead>
      <tbody>
        <tr *ngFor="let item of vm.filteredUsuarios()">
          <td>{{ item.nome }}</td>
          <td>{{ item.login }}</td>
          <td>{{ item.email }}</td>
          <td><span class="status">{{ item.role }}</span></td>
          <td>{{ vm.nomeEmpresa(item.empresaId || undefined) }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
